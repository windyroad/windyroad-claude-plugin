name: Release Preview

# Triggered after the Release workflow completes. The Release workflow uses
# GITHUB_TOKEN to create/update the "Version Packages" PR, which doesn't
# trigger pull_request events. Using workflow_run sidesteps this limitation.
on:
  workflow_run:
    workflows: [Release]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  id-token: write
  actions: read

jobs:
  preview:
    name: Publish Preview
    # Only run when the Release workflow succeeded and a Version Packages PR exists
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Find Version Packages PR
        id: find-pr
        uses: actions/github-script@v8
        with:
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:changeset-release/main`,
              base: 'main',
              state: 'open',
            });
            if (pulls.length === 0) {
              core.info('No Version Packages PR found — skipping preview');
              return;
            }
            core.setOutput('pr_number', pulls[0].number);
            core.setOutput('found', 'true');

      - uses: actions/checkout@v5
        if: steps.find-pr.outputs.found == 'true'
        with:
          ref: changeset-release/main

      - uses: actions/setup-node@v5
        if: steps.find-pr.outputs.found == 'true'
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.find-pr.outputs.found == 'true'
        run: npm ci || npm install

      - name: Publish preview packages
        if: steps.find-pr.outputs.found == 'true'
        id: preview
        run: |
          RUN_NUMBER="${{ github.run_number }}"
          PUBLISHED=""
          for pkg in packages/*/package.json; do
            dir=$(dirname "$pkg")
            name=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$pkg','utf8')).name)")
            version=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$pkg','utf8')).version)")

            [ -z "$name" ] && continue

            # Append pre-release suffix to avoid colliding with the real release version
            preview_version="${version}-preview.${RUN_NUMBER}"
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$pkg','utf8'));
              pkg.version = '${preview_version}';
              fs.writeFileSync('$pkg', JSON.stringify(pkg, null, 2) + '\n');
            "

            echo "Publishing $name@$preview_version with tag preview..."
            (cd "$dir" && npm publish --tag preview --provenance --access public 2>&1) || true
            PUBLISHED="$PUBLISHED\n- \`$name@$preview_version\` -> \`npx $name@preview\`"
          done

          echo "published<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$PUBLISHED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Smoke test preview install
        if: steps.find-pr.outputs.found == 'true'
        run: |
          npm info @windyroad/agent-plugins@preview version 2>/dev/null && \
            echo "Preview package available on npm" || \
            echo "Preview package not yet available (first publish)"

      - name: Comment on PR
        if: steps.find-pr.outputs.found == 'true'
        uses: actions/github-script@v8
        env:
          PR_NUMBER: ${{ steps.find-pr.outputs.pr_number }}
          PUBLISHED: ${{ steps.preview.outputs.published }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const published = process.env.PUBLISHED || '(none)';
            const body = [
              '## Release Preview',
              '',
              'Preview packages published to npm with the `preview` tag.',
              '',
              '### Test it',
              '',
              '```bash',
              '# Install the full preview suite',
              'npx @windyroad/agent-plugins@preview',
              '',
              '# Or test individual packages',
              'npx @windyroad/architect@preview',
              'npx @windyroad/c4@preview',
              '```',
              '',
              '### Published packages',
              '',
              published,
              '',
              '---',
              '*Merge this PR to publish these versions to `latest`.*',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Release Preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
